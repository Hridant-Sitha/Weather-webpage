<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="deco.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Weather App</title>
  </head>
  <body>
    <div class="container">
      <div class="search">
        <div class="location"><i class="fa-solid fa-location-dot"></i></div>
        <input type="text" placeholder="Location" value="">
        <button class="search-location"><i class="fa-solid fa-magnifying-glass"></i></button>
      </div>
      <img class="image" src="icon.webp">
      <div class="data">
        <div class="temperature">
          <p class="text">temperature</p>
          <p class="value">--</p>
        </div>
        <div class="row2">
          <div class="max-temp">
            <p class="text"><i class="fa-solid fa-temperature-arrow-up"></i> Max. temperature</p>
            <p class="value">--</p>
          </div>
          <div class="min-temp">
            <p class="text"><i class="fa-solid fa-temperature-arrow-down"></i> Min. temperature</p>
            <p class="value">--</p>
          </div>
        </div>
        <div class="row3">
          <div class="humidity">
            <p class="text"><i class="fa-solid fa-water"></i> Humidity</p>
            <p class="value">--</p>
          </div>
          <div class="windSpeed">
            <p class="text"><i class="fa-solid fa-wind"></i> Wind Speed</p>
            <p class="value">--</p>
          </div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
